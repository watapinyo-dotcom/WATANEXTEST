<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎁 จับคู่ลับ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --card: #1e1e2e;
      --border: #2a2a3e;
      --accent: #e8c97a;
      --accent2: #c97aac;
      --text: #eeeef5;
      --muted: #7c7c9a;
      --glow: rgba(232, 201, 122, 0.15);
      --glow2: rgba(201, 122, 172, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -15%;
      width: 55%;
      height: 55%;
      background: radial-gradient(ellipse, var(--glow2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.7s ease both;
    }
    .header .emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
      animation: bounce 2s ease infinite;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeUp 0.7s 0.15s ease both;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    /* Input group */
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input::placeholder { color: var(--muted); }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 201, 122, 0.12);
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0d0d14;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232, 201, 122, 0.3);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 10px;
      font-size: 0.9rem;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    /* Loading */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Error */
    .error-box {
      background: rgba(255, 80, 80, 0.08);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #ff8080;
      margin-top: 16px;
      line-height: 1.5;
    }

    /* Result card */
    .result-card {
      display: none;
      text-align: center;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .result-card.show { display: block; }

    .result-from, .result-to {
      background: var(--surface);
      border-radius: 14px;
      padding: 20px;
      margin: 16px 0;
      border: 1px solid var(--border);
    }
    .result-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .result-from .result-name { color: var(--text); }
    .result-to .result-name {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .arrow-wrap {
      font-size: 1.8rem;
      margin: 4px 0;
      animation: pulse 1.5s ease infinite;
    }

    .result-msg {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Config hint */
    .config-hint {
      margin-top: 32px;
      background: rgba(232, 201, 122, 0.06);
      border: 1px dashed rgba(232, 201, 122, 0.3);
      border-radius: 14px;
      padding: 20px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
      animation: fadeUp 0.7s 0.3s ease both;
    }
    .config-hint strong { color: var(--accent); }
    .config-hint code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 0.85em;
      color: var(--accent2);
    }
    .config-hint a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.15); opacity: 0.7; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <span class="emoji">🎁</span>
    <h1>จับคู่ลับ</h1>
    <p>กรอกชื่อของคุณเพื่อดูว่าได้คู่ใคร</p>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">

    <!-- Search form -->
    <div id="searchForm">
      <div class="input-group">
        <label>ชื่อของคุณ</label>
        <input
          type="text"
          id="nameInput"
          placeholder="พิมพ์ชื่อตรงๆ เลย..."
          autocomplete="off"
          autofocus
        />
      </div>
      <button class="btn btn-primary" id="searchBtn" onclick="lookupName()">
        🔍 ค้นหาคู่ของฉัน
      </button>
      <div id="errorBox"></div>
    </div>

    <!-- Loading state -->
    <div class="loader" id="loader" style="display:none">
      <div class="spinner"></div>
      กำลังดึงข้อมูล…
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-from">
        <div class="result-label">👤 คุณคือ</div>
        <div class="result-name" id="resultYou"></div>
      </div>
      <div class="arrow-wrap">🎯</div>
      <div class="result-to">
        <div class="result-label">🎁 คู่ที่คุณได้คือ</div>
        <div class="result-name" id="resultPartner"></div>
      </div>
      <p class="result-msg" id="resultMsg"></p>
      <button class="btn btn-ghost" onclick="resetForm()">🔄 ค้นหาใหม่</button>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
